services:
  jekyll:
    image: amirpourmand/al-folio:latest
    build: .
    ports:
      - 8080:8080
      - 35729:35729
    volumes:
      - .:/srv/jekyll
    environment:
      - JEKYLL_ENV=development
      - BUNDLE_PATH=/srv/jekyll/vendor/bundle
    entrypoint: ["bundle", "exec", "jekyll", "serve", "--host", "0.0.0.0", "--port", "8080", "--watch", "--livereload", "--force_polling"]